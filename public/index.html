<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Atividades</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h1>Gestão de Atividades</h1>

    <!-- Form Funcionário -->
    <div class="form-section">
      <h2>Cadastrar Funcionário</h2>
      <form id="formFuncionario">
        <div class="form-group">
          <label for="nomeFuncionario">Nome:</label>
          <input type="text" id="nomeFuncionario" required>
        </div>
        <div class="form-group">
          <label for="emailFuncionario">Email:</label>
          <input type="email" id="emailFuncionario" required>
        </div>
        <button type="submit">Criar Funcionário</button>
      </form>
      <div id="msgFuncionario"></div>
    </div>

    <!-- Form Tarefa -->
    <div class="form-section">
      <h2>Cadastrar Tarefa</h2>
      <form id="formTarefa">
        <div class="form-group">
          <label for="nomeTarefa">Título:</label>
          <input type="text" id="nomeTarefa" required>
        </div>
        <div class="form-group">
          <label for="descricaoTarefa">Descrição:</label>
          <input type="text" id="descricaoTarefa" required>
        </div>
        <div class="form-group">
          <label for="prazoTarefa">Prazo:</label>
          <input type="date" id="prazoTarefa" required>
        </div>
        <div class="form-group">
          <label for="prioridadeTarefa">Prioridade:</label>
          <select id="prioridadeTarefa" required>
            <option value="">Selecione...</option>
            <option value="1">Baixa</option>
            <option value="2">Média</option>
            <option value="3">Alta</option>
            <option value="4">Crítica</option>
          </select>
        </div>
        <div class="form-group">
          <label for="responsavelTarefa">Responsável (opcional):</label>
          <select id="responsavelTarefa">
            <option value="">Sem responsável</option>
          </select>
        </div>
        <button type="submit">Criar Tarefa</button>
      </form>
      <div id="msgTarefa"></div>
    </div>

    <!-- Funcionários -->
    <div class="form-section">
      <h2>Funcionários</h2>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="corpoFuncionarios">
          <tr><td colspan="3">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Tarefas -->
    <div class="form-section">
      <h2>Tarefas</h2>
      <div class="filters">
        <button id="btnTodasTarefas" class="filter-btn active">Todas</button>
        <button id="btnTarefasAndamento" class="filter-btn">Em andamento</button>
        <button id="btnTarefasConcluidas" class="filter-btn">Concluídas</button>
        <button id="btnTarefasAtrasadas" class="filter-btn">Atrasadas</button>
        <button id="btnTarefasProximas" class="filter-btn">Próximas</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Título</th>
            <th>Descrição</th>
            <th>Prazo</th>
            <th>Prioridade</th>
            <th>Responsável</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="corpoTarefas">
          <tr><td colspan="6">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Modal Editar Funcionário -->
    <div id="modalEditarFuncionario" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h3>Editar Funcionário</h3>
        <form id="formEditarFuncionario">
          <input type="hidden" id="editarFuncionarioId">
          <div class="form-group">
            <label for="editarNomeFuncionario">Nome:</label>
            <input type="text" id="editarNomeFuncionario" required>
          </div>
          <div class="form-group">
            <label for="editarEmailFuncionario">Email:</label>
            <input type="email" id="editarEmailFuncionario" required>
          </div>
          <button type="submit">Atualizar</button>
        </form>
      </div>
    </div>

    <!-- Modal Editar Tarefa -->
    <div id="modalEditarTarefa" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h3>Editar Tarefa</h3>
        <form id="formEditarTarefa">
          <input type="hidden" id="editarTarefaId">
          <div class="form-group">
            <label for="editarNomeTarefa">Título:</label>
            <input type="text" id="editarNomeTarefa" required>
          </div>
          <div class="form-group">
            <label for="editarDescricaoTarefa">Descrição:</label>
            <input type="text" id="editarDescricaoTarefa" required>
          </div>
          <div class="form-group">
            <label for="editarPrazoTarefa">Prazo:</label>
            <input type="date" id="editarPrazoTarefa" required>
          </div>
          <div class="form-group">
            <label for="editarPrioridadeTarefa">Prioridade:</label>
            <select id="editarPrioridadeTarefa" required>
              <option value="">Selecione...</option>
              <option value="1">Baixa</option>
              <option value="2">Média</option>
              <option value="3">Alta</option>
              <option value="4">Crítica</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editarResponsavelTarefa">Responsável:</label>
            <select id="editarResponsavelTarefa">
              <option value="">Sem responsável</option>
            </select>
          </div>
          <button type="submit">Atualizar</button>
        </form>
      </div>
    </div>
  </div>

  

<script src="./script.js"></script>
</body>
</html>
